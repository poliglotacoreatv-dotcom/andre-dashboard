<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>축구스타 김도경</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0d1a0d;font-family:'Noto Sans KR',sans-serif;color:#fff}

  /* ===== INTRO ===== */
  #intro-screen{
    position:fixed;inset:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:200;gap:24px;
  }
  #intro-title{
    font-family:'Black Han Sans',sans-serif;font-size:5.6rem;
    background:linear-gradient(90deg,#909090,#d8d8d8,#ffffff,#d8d8d8,#909090);
    background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:6px;animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer{0%,100%{filter:drop-shadow(0 2px 8px rgba(200,200,200,0.3))}50%{filter:drop-shadow(0 2px 24px rgba(220,220,220,0.7))}}
  #intro-vs-row{display:flex;align-items:center;gap:30px;font-family:'Black Han Sans',sans-serif;font-size:1.6rem}
  .intro-team-name-kor{color:#e53935;text-shadow:0 0 20px #e5393566}
  .intro-team-name-bra{color:#F5D800;text-shadow:0 0 20px #F5D80066}
  .intro-vs-text{color:#777;font-size:1.1rem}
  #intro-subtitle{color:#999;font-size:.85rem;text-align:center;line-height:1.7}
  .intro-role-btns{display:flex;gap:24px;margin-top:6px}
  .intro-role-btn{
    padding:14px 32px;font-size:1rem;font-family:'Black Han Sans',sans-serif;
    border:none;border-radius:12px;cursor:pointer;letter-spacing:2px;
    display:flex;align-items:center;gap:12px;
    transition:transform .15s,box-shadow .15s;font-weight:900;
  }
  .intro-role-btn:hover{transform:scale(1.07)}
  #intro-btn-korea{background:linear-gradient(135deg,#c62828,#e53935);color:#fff;box-shadow:0 4px 24px #e5393555}
  #intro-btn-brazil{background:linear-gradient(135deg,#c8a800,#F5D800);color:#1a1200;box-shadow:0 4px 24px #F5D80055}
  .intro-rule{font-size:.75rem;color:#555;text-align:center;line-height:1.7;border-top:1px solid #222;padding-top:14px;max-width:420px}

  /* ===== ROOT ===== */
  #root{width:100vw;height:100vh;display:flex;flex-direction:row;align-items:center;justify-content:center}

  /* ===== LEFT PANEL ===== */
  #left-panel{display:flex;flex-direction:column;align-items:flex-end;padding-right:10px;flex-shrink:0}
  #left-panel h3{
    font-family:'Black Han Sans',sans-serif;font-size:.82rem;
    background:linear-gradient(90deg,#c0c0c0,#fff,#c0c0c0);
    background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:2px;margin-bottom:6px;align-self:flex-start;padding-left:4px;
  }
  /* Score table — only 5 rows (한국 kicks rounds 1,3,5,7,9 → displayed as row 1~5) */
  #score-table{border-collapse:collapse;font-size:.78rem;width:164px}
  #score-table th{padding:4px 6px;border:1px solid rgba(255,255,255,0.12);text-align:center;font-family:'Black Han Sans',sans-serif;font-size:.7rem}
  #score-table td{padding:5px 6px;border:1px solid rgba(255,255,255,0.08);text-align:center;color:#ddd;font-size:.82rem}
  .th-round{background:rgba(255,255,255,0.07);color:#888;width:26px}
  .th-korea{background:rgba(229,57,53,0.18);width:66px}
  .th-brazil{background:rgba(245,216,0,0.18);width:66px}
  .th-flag-cell{display:flex;align-items:center;justify-content:center;gap:4px}
  .th-flag-mini{width:22px;height:15px;border-radius:2px;overflow:hidden;flex-shrink:0;display:inline-flex}
  .td-o-kor{color:#ff7070;font-weight:900;font-size:1rem}
  .td-x-kor{color:#ff7070;opacity:.4;font-size:.9rem}
  .td-o-bra{color:#F5D800;font-weight:900;font-size:1rem}
  .td-x-bra{color:#F5D800;opacity:.4;font-size:.9rem}
  .td-empty{color:#2a2a2a}
  #total-score{
    margin-top:6px;font-family:'Black Han Sans',sans-serif;font-size:.8rem;
    background:rgba(0,0,0,0.5);border-radius:8px;padding:6px 10px;
    text-align:center;border:1px solid rgba(255,255,255,0.08);width:164px;line-height:1.7;
  }
  .kor-sc{color:#ff8a80}.bra-sc{color:#F5D800}

  /* ===== CENTER ===== */
  #center-col{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center}
  #game-title{
    font-family:'Black Han Sans',sans-serif;font-size:1.45rem;
    background:linear-gradient(90deg,#808080,#d0d0d0,#ffffff,#d0d0d0,#808080);
    background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:5px;margin-bottom:3px;
  }
  #round-info{font-size:.75rem;color:#777;letter-spacing:1px;margin-bottom:4px;min-height:15px}

  /* ===== STADIUM ===== */
  #stadium-wrap{position:relative;width:700px;height:490px}
  #stadium{
    position:absolute;inset:0;
    background:linear-gradient(160deg,#1b5e20 0%,#2e7d32 45%,#388e3c 75%,#1b5e20 100%);
    border-radius:10px;overflow:hidden;border:3px solid #ffffff20;
  }
  .stripe{position:absolute;width:100%;background:rgba(255,255,255,0.03)}
  #field-center-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.16)}
  #pen-arc{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:150px;height:75px;border-top:2px solid rgba(255,255,255,0.16);border-radius:75px 75px 0 0}

  /* GOAL */
  #goal-wrap{position:absolute;top:3%;left:50%;transform:translateX(-50%);width:62%;height:53%}
  .post{position:absolute;background:linear-gradient(90deg,#b0bec5,#eceff1,#b0bec5);border-radius:4px}
  #bar-top{top:0;left:0;width:100%;height:10px}
  #post-l{top:0;left:0;width:10px;height:100%}
  #post-r{top:0;right:0;width:10px;height:100%}
  #dep-top{position:absolute;top:0;left:10px;width:calc(100% - 20px);height:7px;background:linear-gradient(180deg,#78909c,#546e7a);transform-origin:top;transform:rotateX(-55deg) translateY(-3px)}
  #dep-l{position:absolute;top:10px;left:0;width:7px;height:calc(100% - 10px);background:linear-gradient(90deg,#78909c,#546e7a);transform-origin:left;transform:rotateY(55deg) translateX(-3px)}
  #dep-r{position:absolute;top:10px;right:0;width:7px;height:calc(100% - 10px);background:linear-gradient(270deg,#78909c,#546e7a);transform-origin:right;transform:rotateY(-55deg) translateX(3px)}
  #goal-net{position:absolute;top:10px;left:10px;width:calc(100% - 20px);height:calc(100% - 10px);overflow:hidden}
  #netCanvas{display:block;width:100%;height:100%}
  #zone-nums{
    position:absolute;top:12px;left:12px;width:calc(100% - 24px);height:calc(100% - 12px);
    display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;
    pointer-events:none;z-index:4;
  }
  .zn{display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:rgba(255,255,255,0.42);text-shadow:0 1px 4px #000}

  /* PERSONS */
  .person{position:absolute;width:40px;display:flex;flex-direction:column;align-items:center;transition:all 0.55s cubic-bezier(.4,0,.2,1)}
  .p-head{width:24px;height:24px;background:#ffdbac;border-radius:50%;border:2px solid #c8a055}
  .p-torso{width:32px;height:38px;border-radius:6px;margin-top:2px}
  .p-legs{display:flex;gap:5px;margin-top:2px}
  .p-leg{width:11px;height:26px;border-radius:4px}
  .korea-shirt{background:#C62828}.korea-leg{background:#B71C1C}
  .brazil-shirt{background:#F5D800}.brazil-leg{background:#c8a800}
  #keeper{position:absolute;top:33%;left:50%;transform:translateX(-50%);z-index:10}
  #kicker{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);z-index:20}

  /* BALL */
  #ball{position:absolute;bottom:21%;left:50%;transform:translateX(-50%);font-size:30px;z-index:15;transition:all 0.65s cubic-bezier(.25,.46,.45,.94);filter:drop-shadow(0 3px 6px #00000099)}

  /* COUNTDOWN */
  #countdown-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Black Han Sans',sans-serif;font-size:5rem;color:#FFD700;text-shadow:0 0 30px #FFD700,0 0 60px #FFD70088;z-index:35;pointer-events:none;opacity:0;transition:opacity 0.2s}
  #status-bar{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:.82rem;font-weight:700;color:#FFD700;z-index:25;text-shadow:0 1px 4px #000;min-height:18px}

  /* RIGHT PANEL */
  #right-panel{display:flex;flex-direction:column;align-items:flex-start;padding-left:10px;flex-shrink:0;gap:8px}
  #right-label{font-size:.73rem;color:#777;text-align:center;line-height:1.7;width:170px}
  /* CLICK HINT */
  #click-hint{
    display:none;
    flex-direction:column;align-items:center;
    width:170px;gap:2px;
    animation:clickPulse 0.9s ease-in-out infinite;
  }
  #click-role-badge{
    font-family:'Black Han Sans',sans-serif;font-size:.95rem;letter-spacing:2px;
    padding:5px 14px;border-radius:8px;margin-bottom:4px;
    text-align:center;white-space:nowrap;
  }
    font-family:'Black Han Sans',sans-serif;font-size:1.3rem;
    letter-spacing:3px;color:#FFD700;
    text-shadow:0 0 12px #FFD700,0 0 24px #FFD70099;
  }
  #click-arrow{
    font-size:2rem;color:#FFD700;line-height:1;
    text-shadow:0 0 12px #FFD700,0 0 24px #FFD70099;
    animation:arrowBounce 0.9s ease-in-out infinite;
  }
  @keyframes clickPulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.35;transform:scale(0.92)}
  }
  @keyframes arrowBounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(7px)}
  }
  #controls{display:none;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(2,54px);gap:10px}
  .pos-btn{width:54px;height:54px;background:rgba(255,255,255,0.88);border:none;border-radius:50%;font-weight:900;font-size:1.15rem;cursor:pointer;color:#1a1a1a;transition:background .12s,transform .12s;font-family:'Black Han Sans',sans-serif}
  .pos-btn:hover{background:#FFD700;transform:scale(1.12)}

  /* TUTORIAL */
  #tutorial{position:absolute;inset:0;background:rgba(0,0,0,0.87);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:10px}
  #tutorial h2{font-family:'Black Han Sans',sans-serif;font-size:1.7rem;color:#FFD700}
  #tutorial p{color:#ddd;font-size:1.1rem;line-height:2.1;text-align:center;max-width:480px}
  #tut-role-big{font-family:'Black Han Sans',sans-serif;font-size:2rem;letter-spacing:3px;text-align:center;padding:8px 32px;border-radius:10px;margin-top:4px}
  #tutorial .start-btn{margin-top:10px;padding:12px 36px;font-size:1.1rem;font-family:'Black Han Sans',sans-serif;background:#FFD700;color:#1a1a1a;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px}

  /* RESULT */
  #result-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;border-radius:10px}
  #result-banner{background:rgba(5,10,5,0.9);border:3px solid #FFD700;border-radius:16px;padding:20px 40px;text-align:center;animation:bannerIn .4s cubic-bezier(.17,.67,.4,1.4)}
  @keyframes bannerIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  #result-main{font-family:'Black Han Sans',sans-serif;font-size:3rem;letter-spacing:4px;text-shadow:0 0 24px currentColor}
  #result-sub{font-size:.92rem;color:#eee;margin-top:8px}
  #result-log{font-size:.78rem;color:#bbb;margin-top:5px}
  #result-scores{font-size:.78rem;color:#aaa;margin-top:5px}
  #next-btn{margin-top:16px;padding:10px 28px;font-size:.9rem;font-family:'Black Han Sans',sans-serif;background:#FFD700;color:#1a1a1a;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px}

  /* FINAL */
  #final-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.82);z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;border-radius:10px}
  #final-banner{background:rgba(5,10,5,0.94);border:4px solid #FFD700;border-radius:18px;padding:26px 48px;text-align:center;animation:bannerIn .5s cubic-bezier(.17,.67,.4,1.4)}
  #final-title{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:#FFD700;margin-bottom:8px}
  #final-score-line{font-family:'Black Han Sans',sans-serif;font-size:2.6rem;color:#fff;margin:10px 0}
  #final-winner{font-family:'Black Han Sans',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-top:6px}
  #final-restart-btn{margin-top:18px;padding:12px 36px;font-size:1rem;font-family:'Black Han Sans',sans-serif;background:#FFD700;color:#1a1a1a;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px}
</style>
</head>

<!-- INTRO -->
<div id="intro-screen">
  <div id="intro-title">⚽ 축구스타 김도경</div>
  
  <div id="intro-vs-row">
    <span class="intro-team-name-kor">
      <svg style="width:50px;height:33px;border-radius:3px;vertical-align:middle;margin-right:6px"><use href="#flag-korea"/></svg>대한민국
    </span>
    <span class="intro-vs-text">VS</span>
    <span class="intro-team-name-bra">
      브라질<svg style="width:50px;height:33px;border-radius:3px;vertical-align:middle;margin-left:6px"><use href="#flag-brazil"/></svg>
    </span>
  </div>
  <div id="intro-subtitle">각자 5번씩 차고 5번씩 막는 치열한 승부!</div>
  <div class="intro-role-btns">
    <button class="intro-role-btn" id="intro-btn-korea" onclick="chooseTeam('korea')">
      <svg style="width:42px;height:28px;border-radius:3px;flex-shrink:0"><use href="#flag-korea"/></svg>한국 선택 (선축)
    </button>
    <button class="intro-role-btn" id="intro-btn-brazil" onclick="chooseTeam('brazil')">
      <svg style="width:42px;height:28px;border-radius:3px;flex-shrink:0"><use href="#flag-brazil"/></svg>브라질 선택 (후축)
    </button>
  </div>
  <div class="intro-rule">
    한국 항상 선축 (홀수 라운드 슛) · 🔴 한국 빨강 · 🟡 브라질 노랑<br>
    5초 안에 방향 선택 · 못 고르면 상대 자동 승
  </div>
</div>

<!-- MAIN -->
<div id="root">
  <!-- LEFT -->
  <div id="left-panel">
    <h3>SCORE</h3>
    <table id="score-table">
      <thead>
        <tr>
          <th class="th-round">R</th>
          <th class="th-korea">
            <div class="th-flag-cell">
              <svg class="th-flag-mini"><use href="#flag-korea"/></svg>
              <span style="color:#ff8a80">한국</span>
            </div>
          </th>
          <th class="th-brazil">
            <div class="th-flag-cell">
              <svg class="th-flag-mini"><use href="#flag-brazil"/></svg>
              <span style="color:#F5D800">브라질</span>
            </div>
          </th>
        </tr>
      </thead>
      <tbody id="score-tbody"></tbody>
    </table>
    <div id="total-score">
      <span class="kor-sc">🇰🇷 0</span> &nbsp;:&nbsp; <span class="bra-sc">0 🇧🇷</span>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center-col">
    <div id="game-title">⚽ 축구스타 김도경</div>
    <div id="round-info"></div>
    <div id="stadium-wrap">
      <div id="stadium">
        <div class="stripe" style="top:0;height:49px"></div>
        <div class="stripe" style="top:98px;height:49px"></div>
        <div class="stripe" style="top:196px;height:49px"></div>
        <div class="stripe" style="top:294px;height:49px"></div>
        <div class="stripe" style="top:392px;height:49px"></div>
        <div id="field-center-line"></div>
        <div id="pen-arc"></div>
        <div id="goal-wrap">
          <div class="post" id="bar-top"></div>
          <div class="post" id="post-l"></div>
          <div class="post" id="post-r"></div>
          <div id="dep-top"></div><div id="dep-l"></div><div id="dep-r"></div>
          <div id="goal-net"><canvas id="netCanvas"></canvas></div>
          <div id="zone-nums">
            <div class="zn">4</div><div class="zn">5</div><div class="zn">6</div>
            <div class="zn">1</div><div class="zn">2</div><div class="zn">3</div>
          </div>
        </div>
        <div class="person" id="keeper">
          <div class="p-head"></div>
          <div class="p-torso" id="keeper-shirt"></div>
          <div class="p-legs"><div class="p-leg" id="keeper-leg-l"></div><div class="p-leg" id="keeper-leg-r"></div></div>
        </div>

          <div class="p-torso" id="kicker-shirt"></div>

            <div id="result-log"></div>
            <div id="result-scores"></div>
            <button id="next-btn" onclick="nextRound()">▶ 다음 라운드</button>
          </div>
        </div>
        <div id="final-overlay">
          <div id="final-banner">
            <div id="final-title">🏆 최종 결과 — 10라운드 완료!</div>
            <div id="final-score-line"></div>
            <div id="final-winner"></div>
            <button id="final-restart-btn" onclick="fullRestart()">🔄 처음부터 다시</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right-panel">
    <div id="click-hint">
      <div id="click-role-badge"></div>
      <div id="click-text">CLICK!</div>
      <div id="click-arrow">&#9660;</div>
    </div>
    <div id="right-label">방향 선택<br>(1~6)</div>
    <div id="controls">
      <button class="pos-btn" onclick="handleInput(4)">4</button>
      <button class="pos-btn" onclick="handleInput(5)">5</button>
      <button class="pos-btn" onclick="handleInput(6)">6</button>
      <button class="pos-btn" onclick="handleInput(1)">1</button>
      <button class="pos-btn" onclick="handleInput(2)">2</button>
      <button class="pos-btn" onclick="handleInput(3)">3</button>
    </div>
  </div>
</div>

<script>
// ===== NET =====
(function(){
  function draw(){
    const c=document.getElementById('netCanvas'),w=document.getElementById('goal-net');
    c.width=w.offsetWidth||434;c.height=w.offsetHeight||205;
    const cx=c.getContext('2d');cx.strokeStyle='rgba(255,255,255,0.17)';cx.lineWidth=1;
    const cols=16,rows=8,cw=c.width/cols,rh=c.height/rows;
    for(let i=0;i<=cols;i++){cx.beginPath();cx.moveTo(i*cw,0);cx.lineTo(i*cw,c.height);cx.stroke()}
    for(let j=0;j<=rows;j++){cx.beginPath();cx.moveTo(0,j*rh);cx.lineTo(c.width,j*rh);cx.stroke()}
  }
  draw();window.addEventListener('resize',draw);window._drawNet=draw;
  window.shakeNet=function(){
    let t=0;const id=setInterval(()=>{
      t++;const c=document.getElementById('netCanvas'),cx=c.getContext('2d');
      cx.clearRect(0,0,c.width,c.height);
      cx.strokeStyle=`rgba(255,255,255,${0.17+Math.sin(t*.8)*.1})`;cx.lineWidth=1;
      const cols=16,rows=8,cw=c.width/cols,rh=c.height/rows,amp=Math.max(0,7-t*.45);
      for(let i=0;i<=cols;i++){cx.beginPath();for(let j=0;j<=rows;j++){const x=i*cw+Math.sin(j*.7+t*.5)*amp,y=j*rh;j===0?cx.moveTo(x,y):cx.lineTo(x,y)}cx.stroke()}
      for(let j=0;j<=rows;j++){cx.beginPath();for(let i=0;i<=cols;i++){const x=i*cw,y=j*rh+Math.sin(i*.5+t*.5)*amp;i===0?cx.moveTo(x,y):cx.lineTo(x,y)}cx.stroke()}
      if(t>16){clearInterval(id);window._drawNet();}
    },55);
  };
})();

// ===== AUDIO =====
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function beep(f,d,v,t){ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,audioCtx.currentTime);g.gain.setValueAtTime(v||.18,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+(d||.35));o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+(d||.35));}
function beepTick(){beep(330,.3,.2);}
function beepShoot(){beep(880,.15,.28);setTimeout(()=>beep(1100,.18,.22),140);}
function beepGoal(){[0,120,240].forEach(d=>setTimeout(()=>beep(1200+d*2,.2,.3),d));}
function beepSave(){beep(400,.25,.28);setTimeout(()=>beep(320,.3,.25),160);}
function beepFinal(){[0,200,400,600].forEach(d=>setTimeout(()=>beep(800+d,.3,.3),d));}

// ===== UNIFORMS =====
function setUniform(pid,team){
  document.getElementById(pid+'-shirt').className='p-torso '+(team==='korea'?'korea-shirt':'brazil-shirt');
  ['l','r'].forEach(s=>document.getElementById(pid+'-leg-'+s).className='p-leg '+(team==='korea'?'korea-leg':'brazil-leg'));
}

// ===== ZONE POS =====
function getSZ(){const s=document.getElementById('stadium');return{w:s.offsetWidth||700,h:s.offsetHeight||490};}
function zonePos(z){
  const {w,h}=getSZ();
  const gw=w*.62,gL=(w-gw)/2,gT=h*.03,gH=h*.53;
  const cX=[gL+gw*.13,gL+gw*.5,gL+gw*.87];
  const rY=[gT+gH*.75,gT+gH*.30];
  const col=(z-1)%3,row=z<=3?0:1;
  return{left:(cX[col]-20)+'px',top:(rY[row])+'px'};
}
const ZN={1:'왼쪽 아래',2:'가운데 아래',3:'오른쪽 아래',4:'왼쪽 위',5:'가운데 위',6:'오른쪽 위'};

// ===== GAME STATE =====
// roundNum 1..10
// odd rounds: korea kicks, brazil keeps
// even rounds: brazil kicks, korea keeps
// playerTeam: which team the human controls
let playerTeam='korea';
let roundNum=0;
let scores={korea:0,brazil:0};
// roundLog: [{round, kickerTeam, result:'goal'|'save'}]
let roundLog=[];
let timeLeft=5,timerInterval=null,gameActive=false;
let playerChoice=null,aiChoice=null,aiTimer=null;

function kickerTeamNow(){return roundNum%2===1?'korea':'brazil';}
function keeperTeamNow(){return roundNum%2===1?'brazil':'korea';}
function playerRoleNow(){return playerTeam===kickerTeamNow()?'kicker':'keeper';}

function chooseTeam(team){
  ensureAudio();
  playerTeam=team;
  roundNum=0;roundLog=[];scores={korea:0,brazil:0};
  document.getElementById('intro-screen').style.display='none';
  updateTable();showTutorial();
}

// ===== SCORE TABLE: 5 rows only (one per kicking turn per team)
// Row i (1..5): show korea result when korea kicked (round 2i-1), brazil result when brazil kicked (round 2i)
// Simpler: each row = one kick pair. Row 1 = rounds 1&2, row 2 = rounds 3&4, etc.
// Actually: Korea kicks rounds 1,3,5,7,9 → 5 results; Brazil kicks rounds 2,4,6,8,10 → 5 results
// Table: 5 rows. Row k: Korea result from round(2k-1), Brazil result from round(2k)
function updateTable(){
  const tbody=document.getElementById('score-tbody');
  tbody.innerHTML='';
  for(let k=1;k<=5;k++){
    const korRound=2*k-1; // rounds 1,3,5,7,9 — korea kicks
    const braRound=2*k;   // rounds 2,4,6,8,10 — brazil kicks
    const korLog=roundLog.find(r=>r.round===korRound);
    const braLog=roundLog.find(r=>r.round===braRound);
    // Korea result: O if scored (goal), X if not (save)
    let korCell='<span class="td-empty">·</span>';
    let braCell='<span class="td-empty">·</span>';
    if(korLog) korCell=korLog.result==='goal'?'<span class="td-o-kor">O</span>':'<span class="td-x-kor">X</span>';
    if(braLog) braCell=braLog.result==='goal'?'<span class="td-o-bra">O</span>':'<span class="td-x-bra">X</span>';
    tbody.innerHTML+=`<tr><td>${k}</td><td>${korCell}</td><td>${braCell}</td></tr>`;
  }
  document.getElementById('total-score').innerHTML=
    `<span class="kor-sc">🇰🇷 ${scores.korea}</span> &nbsp;:&nbsp; <span class="bra-sc">${scores.brazil} 🇧🇷</span>`;
}

function showTutorial(){
  roundNum++;
  const role=playerRoleNow();
  const kt=kickerTeamNow(),kpt=keeperTeamNow();
  // Display round as N/5 pair (round 1&2 = pair 1, 3&4 = pair 2, etc.)
  const pairNum=Math.ceil(roundNum/2);
  document.getElementById('round-info').textContent='라운드 '+roundNum+'/10  ('+pairNum+'/5세트)';

  document.getElementById('tutorial-body').innerHTML=
    '키커는 슈팅 방향을, 키퍼는 점프 방향을 정해서<br>'+
    '<b style="color:#FFD700;font-size:1.3rem">1 · 2 · 3 · 4 · 5 · 6</b> 중 하나를 클릭하세요!<br><br>'+
    '<span style="color:#aaffaa;font-size:1rem">'+
    (kt==='korea'?'🇰🇷 한국':'🇧🇷 브라질')+' 공격 / '+(kpt==='korea'?'🇰🇷 한국':'🇧🇷 브라질')+' 수비</span>';

  // Big role display
  const isKicker=role==='kicker';
  const roleEl=document.getElementById('tut-role-big');
  roleEl.textContent='당신 역할: '+(isKicker?'⚽ 키커':'🧤 골키퍼');
  roleEl.style.color=isKicker?'#ff8a80':'#82b1ff';
  roleEl.style.background=isKicker?'rgba(220,50,50,0.18)':'rgba(50,100,220,0.18)';
  roleEl.style.border='2px solid '+(isKicker?'#ff8a8066':'#82b1ff66');

  // Update click-hint role badge
  const badge=document.getElementById('click-role-badge');
  badge.textContent='당신: '+(isKicker?'⚽ 키커':'🧤 골키퍼');
  badge.style.color=isKicker?'#ff8a80':'#82b1ff';
  badge.style.background=isKicker?'rgba(220,50,50,0.22)':'rgba(50,100,220,0.22)';
  badge.style.border='1px solid '+(isKicker?'#ff8a8055':'#82b1ff55');

  document.getElementById('tutorial').style.display='flex';
  document.getElementById('tut-start-btn').onclick=()=>{document.getElementById('tutorial').style.display='none';startRound();};
}

function startRound(){
  const kt=kickerTeamNow(),kpt=keeperTeamNow();
  setUniform('kicker',kt);setUniform('keeper',kpt);
  gameActive=true;playerChoice=null;aiChoice=null;timeLeft=5;
  document.getElementById('result-overlay').style.display='none';
  document.getElementById('controls').style.display='grid';
  document.getElementById('click-hint').style.display='flex';

  const kicker=document.getElementById('kicker'),keeper=document.getElementById('keeper'),ball=document.getElementById('ball');
  kicker.style.transition='none';keeper.style.transition='none';ball.style.transition='none';
  const {h}=getSZ();
  keeper.style.top=(Math.round(h*.03+h*.53*.55)-45)+'px';keeper.style.left='50%';keeper.style.transform='translateX(-50%)';
  kicker.style.bottom='12%';kicker.style.left='50%';kicker.style.transform='translateX(-50%)';
  ball.style.cssText='position:absolute;bottom:21%;left:50%;transform:translateX(-50%);font-size:30px;z-index:15;filter:drop-shadow(0 3px 6px #00000099);transition:none';
  void kicker.offsetWidth;
  kicker.style.transition='all .55s cubic-bezier(.4,0,.2,1)';
  keeper.style.transition='all .55s cubic-bezier(.4,0,.2,1)';
  ball.style.transition='all .65s cubic-bezier(.25,.46,.45,.94)';

  const role=playerRoleNow();
  document.getElementById('status-bar').textContent=role==='kicker'?'슛 방향을 선택하세요!':'막을 방향을 선택하세요!';
  setCountdown(5);

  // AI picks randomly at a random time within 5s
  aiTimer=setTimeout(()=>{if(gameActive&&!aiChoice)aiChoice=Math.ceil(Math.random()*6);},800+Math.random()*3500);

  timerInterval=setInterval(()=>{
    timeLeft--;
    if(timeLeft>0){setCountdown(timeLeft);beepTick();}
    else{
      setCountdown(0,role);beepShoot();
      clearInterval(timerInterval);
      setTimeout(()=>{if(gameActive)resolveByTimeout();},400);
    }
  },1000);
}

function setCountdown(n,role){
  const el=document.getElementById('countdown-display');
  el.textContent=n===0?(role==='keeper'?'JUMP!':'SHOOT!'):n;
  el.style.color=n===0?'#FF5252':'#FFD700';
  el.style.opacity='1';setTimeout(()=>el.style.opacity='0',650);
}

// Player pressed a button
function handleInput(pos){
  if(!gameActive)return;
  if(playerChoice)return; // already chose
  playerChoice=pos;
  // Don't stop the timer — wait for both to choose or time to run out
  // If AI has already chosen, resolve immediately
  if(aiChoice!==null){
    clearInterval(timerInterval);if(aiTimer)clearTimeout(aiTimer);
    gameActive=false;
    playSequence(playerChoice,aiChoice);
  }
  // else wait for timer/AI
}

// Timer ran out
function resolveByTimeout(){
  gameActive=false;
  if(aiTimer)clearTimeout(aiTimer);
  // Fill missing choices randomly
  if(!playerChoice)playerChoice=Math.ceil(Math.random()*6);
  if(!aiChoice)aiChoice=Math.ceil(Math.random()*6);
  playSequence(playerChoice,aiChoice);
}

// ===== MISS PROBABILITIES (wide shots go out) =====
// zone: miss chance
const MISS_PROB={1:0.20, 2:0, 3:0.20, 4:0.30, 5:0, 6:0.30};

// ===== CENTER KEEPER ADVANTAGE =====
// If kicker chose 2 or 5, keeper saves if keeper chose 2 OR 5
function isSaved(kickerZone, keeperZone){
  if(kickerZone===2||kickerZone===5){
    return keeperZone===2||keeperZone===5;
  }
  return kickerZone===keeperZone;
}

function playSequence(pChoice,aChoice){
  const role=playerRoleNow();
  const kickerZone=role==='kicker'?pChoice:aChoice;
  const keeperZone=role==='keeper'?pChoice:aChoice;

  // Check wide miss first
  const missChance=MISS_PROB[kickerZone]||0;
  const isMiss=(missChance>0)&&(Math.random()<missChance);

  const kp=zonePos(kickerZone),kpK=zonePos(keeperZone);
  const kicker=document.getElementById('kicker'),ball=document.getElementById('ball'),keeper=document.getElementById('keeper');
  const {w,h}=getSZ();

  document.getElementById('status-bar').textContent='키커는 움직였다!';
  kicker.style.bottom='16%';

  setTimeout(()=>{
    if(isMiss){
      // Ball flies toward the zone first, then curves wide out of frame
      ball.style.top=kp.top;ball.style.left=kp.left;ball.style.transform='translateX(-50%)';ball.style.fontSize='15px';
      document.getElementById('status-bar').textContent=(kickerTeamNow()==='korea'?'🇰🇷':'🇧🇷')+' '+ZN[kickerZone]+'('+kickerZone+'번)으로 찼다!';
    } else {
      ball.style.top=kp.top;ball.style.left=kp.left;ball.style.transform='translateX(-50%)';ball.style.fontSize='15px';
      document.getElementById('status-bar').textContent=(kickerTeamNow()==='korea'?'🇰🇷':'🇧🇷')+' '+ZN[kickerZone]+'('+kickerZone+'번)으로 찼다!';
    }
  },380);

  setTimeout(()=>{
    if(!isMiss){
      document.getElementById('status-bar').textContent=(keeperTeamNow()==='korea'?'🇰🇷':'🇧🇷')+' 키퍼 '+keeperZone+'번으로 뛰었다!';
      keeper.style.top=kpK.top;keeper.style.left=kpK.left;keeper.style.transform='translateX(-50%)';
    } else {
      document.getElementById('status-bar').textContent='공이 골대를 벗어났다!';
      // keeper stays put, looks surprised
    }
  },520);

  setTimeout(()=>{
    if(isMiss){
      // Animate ball flying further out wide
      beepMiss();
      ball.style.transition='all .55s ease-in';
      // 1,4 = left side → fly further left; 3,6 = right side → fly further right
      const goLeft=(kickerZone===1||kickerZone===4);
      ball.style.left=goLeft?'-40px':(w+40)+'px';
      ball.style.top=(parseInt(kp.top)-30)+'px';
      ball.style.fontSize='10px';
      ball.style.opacity='0.3';
      document.getElementById('status-bar').textContent='빗나갔습니다! 골대 밖으로!';
      setTimeout(()=>showResult('miss',kickerZone,keeperZone),2000);
    } else {
      const saved=isSaved(kickerZone,keeperZone);
      if(saved){
        beepSave();
        ball.style.transition='all .5s ease-in';
        ball.style.top=(h*.6)+'px';ball.style.left='50%';ball.style.fontSize='24px';
        document.getElementById('status-bar').textContent='선방!';
      } else {
        beepGoal();shakeNet();
        document.getElementById('status-bar').textContent='골인!';
      }
      setTimeout(()=>showResult(saved?'save':'goal',kickerZone,keeperZone),2000);
    }
  },1050);
}

function beepMiss(){
  // descending tone — miss sound
  [0,80,160].forEach((d,i)=>{
    setTimeout(()=>{
      ensureAudio();
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.setValueAtTime(600-i*120,audioCtx.currentTime);
      g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);
      o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.25);
    },d);
  });
}

function showResult(type,kickZ,keepZ){
  const kt=kickerTeamNow(),kpt=keeperTeamNow();
  const main=document.getElementById('result-main'),sub=document.getElementById('result-sub'),
        log=document.getElementById('result-log'),sc=document.getElementById('result-scores');
  let logResult='save'; // miss counts as no-goal = save for score

  if(type==='goal'){
    logResult='goal';
    scores[kt]++;
    main.textContent='⚽ 골 인!';
    main.style.color=kt==='korea'?'#ff8a80':'#F5D800';
    sub.textContent=(kt==='korea'?'🇰🇷 한국':'🇧🇷 브라질')+' 득점!';
    log.textContent='키커 → '+ZN[kickZ]+'('+kickZ+'번) | 키퍼 → '+ZN[keepZ]+'('+keepZ+'번)';
  } else if(type==='save'){
    logResult='save';
    scores[kpt]++;
    main.textContent='🧤 선 방!';
    main.style.color=kpt==='korea'?'#ff8a80':'#F5D800';
    sub.textContent=(kpt==='korea'?'🇰🇷 한국':'🇧🇷 브라질')+' 키퍼 선방!';
    log.textContent='키커 → '+ZN[kickZ]+'('+kickZ+'번) | 키퍼 → '+ZN[keepZ]+'('+keepZ+'번)';
  } else { // miss
    logResult='save'; // no goal = X for kicker
    scores[kpt]++;
    main.textContent='💨 빗 나 감!';
    main.style.color='#aaaaaa';
    sub.textContent='공이 골대를 벗어났습니다!';
    log.textContent='키커 → '+ZN[kickZ]+'('+kickZ+'번) | 골대 밖으로 빗나감';
  }

  roundLog.push({round:roundNum,kickerTeam:kt,result:logResult});
  updateTable();

  sc.textContent='🇰🇷 '+scores.korea+' : '+scores.brazil+' 🇧🇷  ('+roundNum+'/10라운드)';
  document.getElementById('next-btn').textContent=roundNum>=10?'🏆 최종 결과 보기':'▶ 다음 라운드';
  document.getElementById('controls').style.display='none';
  document.getElementById('click-hint').style.display='none';
  document.getElementById('result-overlay').style.display='flex';
}

function nextRound(){
  document.getElementById('result-overlay').style.display='none';
  if(roundNum>=10)showFinalResult();else showTutorial();
}

function showFinalResult(){
  beepFinal();
  const {korea,brazil}=scores;
  document.getElementById('final-score-line').innerHTML=
    '<span style="color:#ff8a80">🇰🇷 '+korea+'</span> &nbsp;:&nbsp; <span style="color:#F5D800">'+brazil+' 🇧🇷</span>';
  const fw=document.getElementById('final-winner');
  if(korea>brazil)fw.innerHTML='🥇 <span style="color:#ff8a80">대한민국 승리!</span>';
  else if(brazil>korea)fw.innerHTML='🥇 <span style="color:#F5D800">브라질 승리!</span>';
  else fw.innerHTML='<span style="color:#aaffaa">🤝 무승부!</span>';
  document.getElementById('final-overlay').style.display='flex';
}

function fullRestart(){
  scores={korea:0,brazil:0};roundNum=0;roundLog=[];
  document.getElementById('final-overlay').style.display='none';
  document.getElementById('round-info').textContent='';
  updateTable();
  document.getElementById('intro-screen').style.display='flex';
}
</script>
</body>
</html>
